<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q-BitX Wallet Install</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F0B1E;
      color: #E8E0FF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1A1230;
      border: 1px solid rgba(123, 97, 255, 0.2);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 380px;
      width: 90%;
      text-align: center;
    }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, rgba(123,97,255,0.3), rgba(59,130,246,0.3));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .version { color: #9B8EC4; font-size: 14px; margin-bottom: 24px; }
    .features {
      text-align: left;
      margin-bottom: 32px;
    }
    .features div {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      font-size: 14px;
      color: #C4B8E8;
    }
    .features .dot {
      width: 8px; height: 8px;
      background: #7B61FF;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .install-btn {
      display: block;
      background: linear-gradient(135deg, #7B61FF, #5B3FDF);
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 600;
      transition: transform 0.1s;
    }
    .install-btn:active { transform: scale(0.97); }
    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #6B5E8A;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1F6E1;</div>
    <h1>Q-BitX Wallet</h1>
    <p class="version">v1.0.0 &middot; iOS</p>
    <div class="features">
      <div><span class="dot"></span> Post-Quantum Secure (Dilithium3)</div>
      <div><span class="dot"></span> On-Device Key Generation</div>
      <div><span class="dot"></span> Multi-Wallet Support</div>
    </div>
    <a class="install-btn" href="itms-services://?action=download-manifest&url=https://l2b2n.github.io/qbitx-install/manifest.plist">
      Installieren
    </a>
    <p class="note">
      Nach der Installation: Einstellungen &rarr; Allgemein &rarr; VPN &amp; Ger&auml;teverwaltung &rarr; Entwickler-Zertifikat vertrauen
    </p>
  </div>
</body>
</html>
